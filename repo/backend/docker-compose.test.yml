services:
  trainingops-test-db:
    image: postgres:16
    container_name: trainingops-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trainingops_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trainingops_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - trainingops-test-db-data:/var/lib/postgresql/data

volumes:
  trainingops-test-db-data:
